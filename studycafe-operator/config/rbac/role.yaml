---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps.studycafe.io
  resources:
  - studycafes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps.studycafe.io
  resources:
  - studycafes/finalizers
  verbs:
  - update
- apiGroups:
  - apps.studycafe.io
  resources:
  - studycafes/status
  verbs:
  - get
  - patch
  - update
