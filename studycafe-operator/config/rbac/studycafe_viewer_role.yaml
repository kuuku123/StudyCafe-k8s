# This rule is not used by the project studycafe-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to apps.studycafe.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: studycafe-operator
    app.kubernetes.io/managed-by: kustomize
  name: studycafe-viewer-role
rules:
- apiGroups:
  - apps.studycafe.io
  resources:
  - studycaves
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps.studycafe.io
  resources:
  - studycaves/status
  verbs:
  - get
