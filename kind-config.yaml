# Kind cluster configuration with port mappings for WSL2
# Usage: kind create cluster --config kind-config.yaml
#
# This maps NodePort services to host ports so you can access them from
# your WSL2 browser or Windows host.

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: studycafe
nodes:
  - role: control-plane
    extraPortMappings:
      # React frontend (NodePort 30080 → host 3000)
      - containerPort: 30080
        hostPort: 3000
        protocol: TCP
      # API Gateway (NodePort 30083 → host 8083)
      - containerPort: 30083
        hostPort: 8083
        protocol: TCP
